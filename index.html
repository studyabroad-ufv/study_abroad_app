<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFV Study Abroad – Partner Institutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root {
  --green-900: #1a3a2a;
  --green-800: #1e4d35;
  --green-700: #24613f;
  --green-600: #2d7a4f;
  --green-500: #38955f;
  --green-400: #5ab37e;
  --green-300: #8ecda6;
  --green-200: #c2e4d0;
  --green-100: #e6f4ec;
  --green-50: #f2faf6;
  --sand-100: #faf8f5;
  --sand-200: #f0ece5;
  --sand-300: #e0dbd1;
  --ink: #1a1a1a;
  --ink-light: #555;
  --ink-muted: #888;
  --white: #fff;
  --red-500: #d64545;
  --red-100: #fce8e8;
  --amber-500: #d97706;
  --amber-100: #fef3c7;
  --blue-500: #2563eb;
  --blue-100: #dbeafe;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.1);
  --radius: 10px;
  --radius-lg: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sand-100);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: var(--green-900);
  color: var(--white);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,.2);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 32px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-logo {
  width: 44px;
  height: 44px;
  background: var(--green-400);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: var(--green-900);
  flex-shrink: 0;
}

.header h1 {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.header h1 span {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  opacity: .6;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  opacity: .7;
}

.header-meta .count {
  background: var(--green-700);
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: 600;
  opacity: 1;
}

/* ── SEARCH + FILTERS BAR ── */
.controls {
  background: var(--white);
  border-bottom: 1px solid var(--sand-200);
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 78px;
  z-index: 90;
}

.controls-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 32px;
}

.search-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}

.search-box {
  flex: 1;
  position: relative;
}

.search-box svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-muted);
  width: 18px;
  height: 18px;
}

.search-box input {
  width: 100%;
  padding: 11px 14px 11px 42px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  background: var(--sand-100);
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}

.search-box input:focus {
  border-color: var(--green-500);
  box-shadow: 0 0 0 3px rgba(56,149,95,.15);
  background: var(--white);
}

.search-box input::placeholder { color: var(--ink-muted); }

.toggle-filters-btn {
  padding: 11px 18px;
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius);
  background: var(--white);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .2s;
  white-space: nowrap;
  color: var(--ink);
}

.toggle-filters-btn:hover { border-color: var(--green-500); color: var(--green-700); }
.toggle-filters-btn.active { background: var(--green-100); border-color: var(--green-500); color: var(--green-700); }

.filters-panel {
  display: none;
  gap: 12px;
  flex-wrap: wrap;
  padding-top: 4px;
}

.filters-panel.open { display: flex; }

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 180px;
  flex: 1;
}

.filter-group label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink-muted);
}

.filter-group select {
  padding: 9px 12px;
  border: 1.5px solid var(--sand-300);
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  background: var(--sand-100);
  cursor: pointer;
  outline: none;
  transition: border-color .2s;
  color: var(--ink);
}

.filter-group select:focus { border-color: var(--green-500); }

.active-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding-top: 8px;
}

.filter-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 4px 12px;
  background: var(--green-100);
  border: 1px solid var(--green-300);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  color: var(--green-800);
}

.filter-tag button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--green-600);
  line-height: 1;
  padding: 0;
}

.clear-all-btn {
  background: none;
  border: none;
  color: var(--red-500);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  padding: 4px 8px;
}

/* ── RESULTS ── */
.results {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 32px 60px;
}

.results-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  font-size: 14px;
  color: var(--ink-light);
}

.results-info strong { color: var(--ink); }

.view-toggle {
  display: flex;
  gap: 4px;
  background: var(--sand-200);
  border-radius: 8px;
  padding: 3px;
}

.view-toggle button {
  padding: 6px 12px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-muted);
  transition: all .2s;
}

.view-toggle button.active {
  background: var(--white);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}

.card-grid.list-view {
  grid-template-columns: 1fr;
}

.card {
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid var(--sand-200);
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.card-top {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--sand-200);
}

.card-country-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: var(--green-100);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green-700);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 8px;
}

.card h3 {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 4px;
  color: var(--green-900);
}

.card-address {
  font-size: 12px;
  color: var(--ink-muted);
  line-height: 1.4;
}

.card-body {
  padding: 16px 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
}

.card-row-icon {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  background: var(--sand-100);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.card-row-content {
  flex: 1;
  line-height: 1.5;
}

.card-row-label {
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--ink-muted);
  margin-bottom: 1px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.card-tag {
  padding: 2px 8px;
  background: var(--sand-100);
  border: 1px solid var(--sand-200);
  border-radius: 4px;
  font-size: 11px;
  color: var(--ink-light);
}

.card-tag.highlight {
  background: var(--green-100);
  border-color: var(--green-200);
  color: var(--green-700);
}

.card-footer {
  padding: 12px 22px;
  background: var(--sand-50, var(--sand-100));
  border-top: 1px solid var(--sand-200);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  flex-wrap: wrap;
  gap: 6px;
}

.card-footer-badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 11px;
}

.badge-green { background: var(--green-100); color: var(--green-700); }
.badge-amber { background: var(--amber-100); color: var(--amber-500); }
.badge-blue { background: var(--blue-100); color: var(--blue-500); }

/* ── DETAIL MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--white);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 720px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.2);
  animation: modalIn .25s ease-out;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--sand-200);
  position: sticky;
  top: 0;
  background: var(--white);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 1;
}

.modal-close {
  position: absolute;
  right: 20px;
  top: 20px;
  width: 32px;
  height: 32px;
  border: none;
  background: var(--sand-100);
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-muted);
  transition: all .15s;
}

.modal-close:hover { background: var(--sand-200); color: var(--ink); }

.modal-header h2 {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--green-900);
  padding-right: 40px;
}

.modal-body {
  padding: 24px 32px 32px;
}

.modal-section {
  margin-bottom: 24px;
}

.modal-section:last-child { margin-bottom: 0; }

.modal-section h4 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--green-600);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--green-100);
}

.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.modal-field {
  font-size: 13px;
}

.modal-field.full { grid-column: 1 / -1; }

.modal-field-label {
  font-weight: 600;
  color: var(--ink-muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 2px;
}

.modal-field-value {
  color: var(--ink);
  line-height: 1.5;
  word-break: break-word;
}

.modal-field-value a {
  color: var(--green-600);
  text-decoration: none;
}

.modal-field-value a:hover { text-decoration: underline; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-muted);
}

.empty-state svg {
  width: 64px;
  height: 64px;
  margin-bottom: 16px;
  opacity: .4;
}

.empty-state h3 {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  color: var(--ink-light);
  margin-bottom: 8px;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .header-inner { padding: 16px 16px 14px; }
  .header h1 { font-size: 18px; }
  .controls-inner { padding: 12px 16px; }
  .results { padding: 16px 16px 40px; }
  .card-grid { grid-template-columns: 1fr; }
  .filter-group { min-width: 100%; }
  .modal { max-height: 92vh; }
  .modal-header { padding: 20px 20px 16px; }
  .modal-body { padding: 20px; }
  .modal-grid { grid-template-columns: 1fr; }
  .header-meta { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">U</div>
      <h1>
        Study Abroad Partners
        <span>University of the Fraser Valley</span>
      </h1>
    </div>
    <div class="header-meta">
      <span class="count" id="count-badge">0 institutions</span>
      <span id="last-updated"></span>
    </div>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="controls-inner">
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search institutions, countries, fields of study…" />
      </div>
      <button class="toggle-filters-btn" id="toggle-filters" onclick="toggleFilters()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="6" cy="12" r="2" fill="currentColor"/><circle cx="14" cy="18" r="2" fill="currentColor"/><circle cx="8" cy="6" r="2" fill="currentColor"/></svg>
        Filters
      </button>
    </div>
    <div class="filters-panel" id="filters-panel">
      <div class="filter-group">
        <label>Country</label>
        <select id="filter-country" onchange="applyFilters()">
          <option value="">All Countries</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Field of Study</label>
        <select id="filter-field" onchange="applyFilters()">
          <option value="">All Fields</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Housing</label>
        <select id="filter-housing" onchange="applyFilters()">
          <option value="">Any Housing</option>
          <option value="Guaranteed">Guaranteed</option>
          <option value="Not guaranteed">Not Guaranteed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Incentives</label>
        <select id="filter-incentives" onchange="applyFilters()">
          <option value="">Any</option>
          <option value="Yes">Has Incentives</option>
          <option value="No">No Incentives</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Short-term Program</label>
        <select id="filter-shortterm" onchange="applyFilters()">
          <option value="">Any</option>
          <option value="Yes">Available</option>
          <option value="No">Not Available</option>
        </select>
      </div>
      <div class="filter-group">
        <label>English Instruction</label>
        <select id="filter-english" onchange="applyFilters()">
          <option value="">Any</option>
          <option value="Yes">English Main</option>
          <option value="No">Non-English</option>
        </select>
      </div>
    </div>
    <div class="active-filters" id="active-filters"></div>
  </div>
</div>

<!-- RESULTS -->
<div class="results">
  <div class="results-info">
    <span>Showing <strong id="results-count">0</strong> of <strong id="total-count">0</strong> institutions</span>
    <div class="view-toggle">
      <button class="active" onclick="setView('grid', this)" title="Grid View">▦ Grid</button>
      <button onclick="setView('list', this)" title="List View">☰ List</button>
    </div>
  </div>
  <div class="card-grid" id="card-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="card-country-badge" id="modal-country"></div>
      <h2 id="modal-title"></h2>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let DATA = { institutions: [] };
let filteredData = [];

// ── CLEAN SHAREPOINT HTML ──
// Some SharePoint rich text fields return raw HTML — strip tags and decode entities
function cleanHTML(value) {
  if (!value) return null;
  if (typeof value !== 'string') return value;
  // Strip HTML tags
  const stripped = value.replace(/<[^>]*>/g, '').trim();
  // Decode HTML entities
  const decoded = stripped
    .replace(/&quot;/g, '"')
    .replace(/&amp;/g, '&')
    .replace(/&#58;/g, ':')
    .replace(/&#160;/g, ' ')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>');
  return decoded || null;
}

// Clean all fields in an institution object
function cleanInstitution(inst) {
  const cleaned = {};
  for (const key in inst) {
    cleaned[key] = cleanHTML(inst[key]);
  }
  return cleaned;
}

// ── LOAD DATA ──
async function loadData() {
  try {
    const resp = await fetch('data.json');
    DATA = await resp.json();
  } catch (e) {
    console.warn('Could not load data.json, using empty data.');
  }

  if (DATA.last_updated) {
    const d = new Date(DATA.last_updated);
    document.getElementById('last-updated').textContent =
      'Updated ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Clean HTML from all SharePoint rich text fields
  DATA.institutions = DATA.institutions.map(cleanInstitution);

  document.getElementById('total-count').textContent = DATA.institutions.length;
  document.getElementById('count-badge').textContent = DATA.institutions.length + ' institutions';

  populateFilterOptions();
  applyFilters();
}

// ── PARSE FIELDS FROM SHAREPOINT ──
// SharePoint fields come back as JSON strings like ["Arts","Business"]
// or plain comma-separated strings. Handle both.
function parseList(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value;
  const str = String(value).trim();
  // Try parsing as JSON array first
  if (str.startsWith('[')) {
    try {
      const parsed = JSON.parse(str);
      if (Array.isArray(parsed)) return parsed.map(s => String(s).trim()).filter(Boolean);
    } catch(e) {}
  }
  // Fall back to comma/newline splitting
  return str.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
}

// ── POPULATE FILTER DROPDOWNS ──
function populateFilterOptions() {
  const countries = new Set();
  const fields = new Set();

  DATA.institutions.forEach(inst => {
    if (inst.country) countries.add(inst.country);
    parseList(inst.fields_of_study).forEach(f => fields.add(f));
  });

  const countrySelect = document.getElementById('filter-country');
  [...countries].sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    countrySelect.appendChild(opt);
  });

  const fieldSelect = document.getElementById('filter-field');
  [...fields].sort().forEach(f => {
    const opt = document.createElement('option');
    opt.value = f; opt.textContent = f;
    fieldSelect.appendChild(opt);
  });
}

// ── FILTERING ──
function applyFilters() {
  const search    = document.getElementById('search').value.toLowerCase().trim();
  const country   = document.getElementById('filter-country').value;
  const field     = document.getElementById('filter-field').value;
  const housing   = document.getElementById('filter-housing').value;
  const incentives= document.getElementById('filter-incentives').value;
  const shortterm = document.getElementById('filter-shortterm').value;
  const english   = document.getElementById('filter-english').value;

  filteredData = DATA.institutions.filter(inst => {
    if (search) {
      const haystack = [
        inst.institution_name, inst.institution_key, inst.country, inst.address,
        ...parseList(inst.fields_of_study),
        inst.incentive_details, inst.english_language_requirement
      ].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }

    if (country && inst.country !== country) return false;

    if (field) {
      if (!parseList(inst.fields_of_study).includes(field)) return false;
    }

    if (housing) {
      const h = (inst.housing_options || '').toLowerCase();
      if (housing === 'Guaranteed' && !h.includes('guaranteed')) return false;
      if (housing === 'Not guaranteed' && h.includes('guaranteed')) return false;
    }

    if (incentives && inst.incentives_provided !== incentives) return false;
    if (shortterm && inst.offers_short_term !== shortterm) return false;
    if (english && inst.english_main_instruction !== english) return false;

    return true;
  });

  renderCards();
  renderActiveFilters();
  document.getElementById('results-count').textContent = filteredData.length;
}

// ── RENDER ACTIVE FILTER TAGS ──
function renderActiveFilters() {
  const container  = document.getElementById('active-filters');
  const filters    = [];
  const country    = document.getElementById('filter-country');
  const field      = document.getElementById('filter-field');
  const housing    = document.getElementById('filter-housing');
  const incentives = document.getElementById('filter-incentives');
  const shortterm  = document.getElementById('filter-shortterm');
  const english    = document.getElementById('filter-english');

  if (country.value)    filters.push({ label: 'Country: '    + country.value,                        clear: () => { country.value    = ''; applyFilters(); }});
  if (field.value)      filters.push({ label: 'Field: '      + field.value,                          clear: () => { field.value      = ''; applyFilters(); }});
  if (housing.value)    filters.push({ label: 'Housing: '    + housing.selectedOptions[0].text,      clear: () => { housing.value    = ''; applyFilters(); }});
  if (incentives.value) filters.push({ label: 'Incentives: ' + incentives.selectedOptions[0].text,   clear: () => { incentives.value = ''; applyFilters(); }});
  if (shortterm.value)  filters.push({ label: 'Short-term: ' + shortterm.selectedOptions[0].text,    clear: () => { shortterm.value  = ''; applyFilters(); }});
  if (english.value)    filters.push({ label: 'English: '    + english.selectedOptions[0].text,      clear: () => { english.value    = ''; applyFilters(); }});

  container.innerHTML = '';
  if (filters.length === 0) return;

  filters.forEach(f => {
    const tag = document.createElement('span');
    tag.className = 'filter-tag';
    tag.innerHTML = f.label + ' <button onclick="event.stopPropagation()">&times;</button>';
    tag.querySelector('button').addEventListener('click', f.clear);
    container.appendChild(tag);
  });

  if (filters.length > 1) {
    const btn = document.createElement('button');
    btn.className = 'clear-all-btn';
    btn.textContent = 'Clear all';
    btn.onclick = () => {
      document.querySelectorAll('.filter-group select').forEach(s => s.value = '');
      applyFilters();
    };
    container.appendChild(btn);
  }
}

// ── RENDER CARDS ──
function renderCards() {
  const grid = document.getElementById('card-grid');

  if (filteredData.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>No institutions found</h3>
        <p>Try adjusting your filters or search query.</p>
      </div>`;
    return;
  }

  grid.innerHTML = filteredData.map((inst, i) => {
    const fields     = parseList(inst.fields_of_study).slice(0, 3);
    const moreFields = parseList(inst.fields_of_study).length - 3;

    const housingBadge = (inst.housing_options || '').toLowerCase().includes('guaranteed')
      ? '<span class="card-footer-badge badge-green">Housing Guaranteed</span>'
      : inst.housing_options
        ? '<span class="card-footer-badge badge-amber">Housing Available</span>'
        : '';

    return `
      <div class="card" onclick="openModal(${i})">
        <div class="card-top">
          <div class="card-country-badge">${getCountryFlag(inst.country)} ${inst.country || 'N/A'}</div>
          <h3>${inst.institution_name || inst.institution_key || 'Unknown'}</h3>
          <div class="card-address">${inst.address || ''}</div>
        </div>
        <div class="card-body">
          <div class="card-row">
            <div class="card-row-icon">📚</div>
            <div class="card-row-content">
              <div class="card-row-label">Fields of Study</div>
              <div class="card-tags">
                ${fields.map(f => `<span class="card-tag">${f}</span>`).join('')}
                ${moreFields > 0 ? `<span class="card-tag highlight">+${moreFields} more</span>` : ''}
                ${fields.length === 0 ? '<span style="color:var(--ink-muted);font-size:12px">Not specified</span>' : ''}
              </div>
            </div>
          </div>
          ${inst.minimum_gpa ? `
          <div class="card-row">
            <div class="card-row-icon">📊</div>
            <div class="card-row-content">
              <div class="card-row-label">Minimum GPA</div>
              ${inst.minimum_gpa} / 4.33
            </div>
          </div>` : ''}
          ${inst.incentive_details ? `
          <div class="card-row">
            <div class="card-row-icon">🎁</div>
            <div class="card-row-content">
              <div class="card-row-label">Incentives</div>
              ${truncate(inst.incentive_details, 80)}
            </div>
          </div>` : ''}
          ${inst.english_language_requirement ? `
          <div class="card-row">
            <div class="card-row-icon">🌐</div>
            <div class="card-row-content">
              <div class="card-row-label">English Requirement</div>
              ${truncate(inst.english_language_requirement, 80)}
            </div>
          </div>` : ''}
        </div>
        <div class="card-footer">
          ${housingBadge}
          ${inst.offers_short_term === 'Yes' ? '<span class="card-footer-badge badge-blue">Short-term Available</span>' : ''}
        </div>
      </div>`;
  }).join('');
}

// ── MODAL ──
function openModal(index) {
  const inst = filteredData[index];
  if (!inst) return;

  document.getElementById('modal-country').innerHTML = getCountryFlag(inst.country) + ' ' + (inst.country || 'N/A');
  document.getElementById('modal-title').textContent = inst.institution_name || inst.institution_key;

  const body = document.getElementById('modal-body');
  body.innerHTML = buildModalContent(inst);

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modal-overlay') && !event.target.classList.contains('modal-close')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function buildModalContent(inst) {
  const sections = [];

  // General Info
  sections.push(modalSection('General Information', [
    field('Address', inst.address),
    field('Partnership Program', arrStr(inst.partnership_program)),
    field('Nomination Method', arrStr(inst.nomination_method)),
    field('Study Abroad Website', link(inst.study_abroad_website)),
    field('Social Media', link(inst.social_media)),
    field('Fact Sheet', link(inst.fact_sheet_link)),
  ]));

  // Academics
  sections.push(modalSection('Academics', [
    field('Fields of Study', arrStr(inst.fields_of_study), true),
    field('Minimum GPA (out of 4.33)', inst.minimum_gpa),
    field('GPA Requirement Notes', inst.gpa_required),
    field('Minimum Credits Required', inst.minimum_credits),
    field('Min Credits Requirement Notes', inst.min_credits_required),
    field('Credits per Semester', rangeStr(inst.min_credits_per_semester, inst.max_credits_per_semester)),
    field('English Main Instruction', inst.english_main_instruction),
    field('English Language Requirement', inst.english_language_requirement, true),
    field('Courses in English', link(inst.courses_in_english_link)),
    field('Can Take Non-English Courses', inst.can_take_non_english),
    field('Non-English Proficiency', inst.non_english_proficiency, true),
  ]));

  // Dates & Deadlines
  sections.push(modalSection('Dates & Deadlines', [
    field('Fall Nomination Deadline', inst.fall_nomination_deadline),
    field('Fall Application Deadline', inst.fall_application_deadline),
    field('Fall Semester Dates', inst.fall_semester_dates),
    field('Winter Nomination Deadline', inst.winter_nomination_deadline),
    field('Winter Application Deadline', inst.winter_application_deadline),
    field('Winter Semester Dates', inst.winter_semester_dates),
  ]));

  // Short-term Programs
  if (inst.offers_short_term === 'Yes') {
    sections.push(modalSection('Short-term Programs', [
      field('Available Months', arrStr(inst.short_term_months)),
      field('Program Link', link(inst.short_term_link)),
      field('Affects Balance', inst.short_term_affects_balance),
      field('Balance Impact Ratio', inst.balance_impact_ratio),
    ]));
  }

  // Housing & Living
  sections.push(modalSection('Housing & Living Costs', [
    field('Housing Options', inst.housing_options),
    field('Housing Website', link(inst.housing_website)),
    field('Housing Support Resources', inst.housing_support_required),
    field('Housing Support Details', link(inst.housing_support_documents)),
    field('Cost of Living (per semester)', inst.cost_of_living, true),
    field('Insurance Mandatory', inst.insurance_mandatory),
    field('Insurance Cost (CAD)', inst.insurance_cost_cad),
    field('Visa Info', link(inst.visa_info_link)),
  ]));

  // Incentives
  if (inst.incentives_provided === 'Yes') {
    sections.push(modalSection('Incentives & Scholarships', [
      field('Details', inst.incentive_details, true),
    ]));
  }

  // Application
  sections.push(modalSection('Application', [
    field('Required Documents', arrStr(inst.application_documents), true),
  ]));

  // Support
  sections.push(modalSection('Support Services', [
    field('Services Available', arrStr(inst.support_services), true),
    field('Accommodations for Disabilities', inst.accommodations),
    field('Documentation Required', inst.documentation_required, true),
    field('Required Documents List', inst.required_documents, true),
  ]));

  // Contacts
  sections.push(modalSection('Contacts', [
    field('Head of International Office', inst.head_intl_office_name),
    field('Head Email', emailLink(inst.head_intl_office_email)),
    field('Inbound Coordinator', inst.inbound_coordinator),
    field('Inbound Coordinator Email', emailLink(inst.inbound_coordinator_email)),
    field('Outbound Coordinator', inst.outbound_coordinator),
    field('Outbound Email', emailLink(inst.outbound_coordinator_email)),
    field('Partnership Contact', inst.partnership_contact_name),
    field('Partnership Email', emailLink(inst.partnership_contact_email)),
  ]));

  // Promotional
  if (inst.promotional_materials) {
    sections.push(modalSection('Promotional Materials', [
      field('Link', link(inst.promotional_materials), true),
    ]));
  }

  return sections.join('');
}

// ── HELPERS ──
function modalSection(title, fields) {
  const validFields = fields.filter(f => f);
  if (validFields.length === 0) return '';
  return `<div class="modal-section"><h4>${title}</h4><div class="modal-grid">${validFields.join('')}</div></div>`;
}

function field(label, value, full) {
  if (!value || value === 'null' || value === 'undefined') return '';
  return `<div class="modal-field${full ? ' full' : ''}"><div class="modal-field-label">${label}</div><div class="modal-field-value">${value}</div></div>`;
}

// arrStr handles both array values (from old Notion data) and
// comma/newline-separated strings (from SharePoint plain text fields)
function arrStr(a) {
  if (!a) return null;
  const parsed = parseList(a);
  if (parsed.length === 0) return null;
  return parsed.join(', ');
}

function link(url) {
  if (!url) return null;
  const display = url.length > 50 ? url.substring(0, 48) + '…' : url;
  return `<a href="${url}" target="_blank" rel="noopener">${display}</a>`;
}

function emailLink(email) {
  if (!email) return null;
  return `<a href="mailto:${email}">${email}</a>`;
}

function rangeStr(min, max) {
  if (!min && !max) return null;
  if (min && max) return min + ' – ' + max;
  if (min) return min + ' (minimum)';
  return max + ' (maximum)';
}

function truncate(s, len) {
  if (!s) return '';
  return s.length > len ? s.substring(0, len) + '…' : s;
}

function getCountryFlag(country) {
  const flags = {
    'Japan': '🇯🇵', 'South Korea': '🇰🇷', 'China': '🇨🇳', 'Taiwan': '🇹🇼',
    'India': '🇮🇳', 'Thailand': '🇹🇭', 'Vietnam': '🇻🇳', 'Indonesia': '🇮🇩',
    'Malaysia': '🇲🇾', 'Singapore': '🇸🇬', 'Philippines': '🇵🇭',
    'Germany': '🇩🇪', 'France': '🇫🇷', 'Spain': '🇪🇸', 'Italy': '🇮🇹',
    'Netherlands': '🇳🇱', 'Sweden': '🇸🇪', 'Norway': '🇳🇴', 'Denmark': '🇩🇰',
    'Finland': '🇫🇮', 'United Kingdom': '🇬🇧', 'Ireland': '🇮🇪',
    'Australia': '🇦🇺', 'New Zealand': '🇳🇿',
    'USA': '🇺🇸', 'United States': '🇺🇸', 'Mexico': '🇲🇽', 'Brazil': '🇧🇷',
    'Chile': '🇨🇱', 'Colombia': '🇨🇴', 'Argentina': '🇦🇷',
    'Ghana': '🇬🇭', 'South Africa': '🇿🇦', 'Kenya': '🇰🇪',
    'Turkey': '🇹🇷', 'Czech Republic': '🇨🇿', 'Poland': '🇵🇱',
    'Austria': '🇦🇹', 'Switzerland': '🇨🇭', 'Belgium': '🇧🇪', 'Portugal': '🇵🇹',
  };
  return flags[country] || '🌍';
}

// ── VIEW TOGGLE ──
function setView(mode, btn) {
  const grid = document.getElementById('card-grid');
  grid.classList.toggle('list-view', mode === 'list');
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── TOGGLE FILTERS ──
function toggleFilters() {
  const panel = document.getElementById('filters-panel');
  const btn   = document.getElementById('toggle-filters');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
}

// ── KEYBOARD CLOSE ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal(e);
});

// ── SEARCH DEBOUNCE ──
let searchTimeout;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 200);
});

// ── INIT ──
loadData();
</script>
